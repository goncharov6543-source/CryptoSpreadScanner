<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Live Позиція</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0e11; color: #EAECEF; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Хедер */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #161a1e; border-bottom: 1px solid #2b3139; flex-shrink: 0;}
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header h2 { margin: 0; font-size: 1.3em; color: #f0b90b; letter-spacing: 0.5px; }
        .controls-group { display: flex; gap: 5px; background: #0b0e11; padding: 4px; border-radius: 6px; border: 1px solid #2b3139; }
        .btn-tf { background: transparent; border: none; color: #848e9c; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-tf.active { background: #3498db; color: #fff; }
        .btn-tf:hover:not(.active) { background: #2b3139; color: #fff; }
        .custom-select { background: #0b0e11; color: #848e9c; border: 1px solid #3c444f; padding: 6px 12px; border-radius: 6px; font-weight: bold; outline: none; cursor: pointer; transition: 0.2s; font-family: inherit;}
        
        .header-right { display: flex; align-items: center; gap: 20px; }
        .spread-badge { background: rgba(52, 152, 219, 0.15); color: #3498db; padding: 6px 15px; border-radius: 6px; font-size: 1.2em; font-weight: bold; border: 1px solid rgba(52, 152, 219, 0.3); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; transition: background 0.3s; }
        .dot-green { background-color: #00d67c; animation: blink 1.5s infinite; }
        .dot-red { background-color: #e74c3c; box-shadow: 0 0 8px rgba(231, 76, 60, 0.8); }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        /* Макет 60/40 з повзунком */
        .main-layout { display: flex; flex: 1; height: 0; width: 100%; }
        
        /* 60% Графік */
        #chart-wrapper { width: 60%; height: 100%; display: flex; flex-direction: column; min-width: 20%; }
        .prices-overlay { display: flex; gap: 30px; padding: 10px 20px; font-size: 1.2em; font-weight: bold; background: #0b0e11; border-bottom: 1px solid #2b3139; flex-shrink: 0;}
        .price-box { display: flex; align-items: center; gap: 8px; }
        .price-ex1 { color: #00d67c; } 
        .price-ex2 { color: #2962FF; }
        #chart-container { flex: 1; width: 100%; position: relative; }

        /* СПЛІТТЕР (Повзунок зміни розміру) */
        #resizer { width: 6px; background: #1e2329; cursor: col-resize; z-index: 10; transition: background 0.2s; border-left: 1px solid #2b3139; border-right: 1px solid #2b3139; flex-shrink: 0; }
        #resizer:hover, #resizer:active { background: #3498db; }

        /* 40% Стакани + Стрічка принтів */
        #ob-wrapper { flex: 1; height: 100%; display: flex; min-width: 20%; }
        .ob-col { width: 50%; height: 100%; display: flex; flex-direction: column; background: #0b0e11; border-right: 1px solid #2b3139; box-sizing: border-box;}
        .ob-header { text-align: center; padding: 8px; background: #161a1e; font-weight: bold; color: #848e9c; border-bottom: 1px solid #2b3139; font-size: 0.9em; flex-shrink: 0;}
        
        /* СИСТЕМА ДЛЯ ШАРІКІВ І СТАКАНА */
        .ob-body { display: flex; flex: 1; overflow: hidden; height: 100%; }
        
        /* Зона зліва для шаріків */
        .ob-ticks { flex: 0.8; position: relative; border-right: 1px dashed #2b3139; background: #0b0e11; }
        .ob-ticks canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        
        /* Зона справа для самого стакана */
        .ob-dom { flex: 1.2; display: flex; flex-direction: column; }
        
        /* 15 Asks, 1 Mid, 15 Bids = 31 ідеальних рядків */
        .ob-section { flex: 15; display: flex; flex-direction: column; overflow: hidden; }
        .ob-mid { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.1em; font-weight: bold; background: #161a1e; border-top: 1px solid #2b3139; border-bottom: 1px solid #2b3139; overflow: hidden;}
        .ob-row { flex: 1; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; position: relative; font-size: 0.85em; font-family: monospace; z-index: 1; overflow: hidden;}
        
        .ob-mid-ex1 { color: #00d67c; }
        .ob-mid-ex2 { color: #2962FF; }
        
        .ob-bg { position: absolute; right: 0; top: 0; height: 100%; z-index: -1; opacity: 0.15; transition: width 0.1s; }
        .ob-bg-ask { background-color: #ef5350; }
        .ob-bg-bid { background-color: #26a69a; }
        .ob-price { font-weight: bold; }
        .ob-qty { color: #d1d4dc; }
        .c-ask { color: #ef5350; }
        .c-bid { color: #26a69a; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h2 id="pair-title">Loading...</h2>
            
            <div class="controls-group">
                <button class="btn-tf btn-interval active" id="btn-1m" onclick="changeInterval(1, this)">1m</button>
                <button class="btn-tf btn-interval" onclick="changeInterval(5, this)">5m</button>
                <button class="btn-tf btn-interval" onclick="changeInterval(15, this)">15m</button>
            </div>

            <select class="custom-select" onchange="setColorMode(this.value)">
                <option value="standard">Свічки: Стандарт</option>
                <option value="solid">Свічки: Суцільні</option>
            </select>
        </div>
        
        <div class="header-right">
            <div class="spread-badge" id="header-spread">0.00%</div>
            <div title="Статус WebSocket з'єднання">
                <div class="status-dot dot-red" id="ws-status-dot"></div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div id="chart-wrapper">
            <div class="prices-overlay">
                <div class="price-box"><span id="name-ex1" style="font-size:0.8em; color:#848e9c;">Ex1</span> <span class="price-ex1" id="price-ex1">---</span></div>
                <div class="price-box"><span id="name-ex2" style="font-size:0.8em; color:#848e9c;">Ex2</span> <span class="price-ex2" id="price-ex2">---</span></div>
            </div>
            <div id="chart-container"></div>
        </div>
        
        <div id="resizer"></div>
        
        <div id="ob-wrapper">
            <!-- Біржа 1 -->
            <div class="ob-col">
                <div class="ob-header" id="ob-title-1">Exchange 1</div>
                <div class="ob-body">
                    <div class="ob-ticks">
                        <canvas id="ticks-canvas-1"></canvas>
                    </div>
                    <div class="ob-dom">
                        <div class="ob-section asks" id="ob-asks-1"></div>
                        <div class="ob-mid ob-mid-ex1" id="ob-mid-1">---</div>
                        <div class="ob-section bids" id="ob-bids-1"></div>
                    </div>
                </div>
            </div>
            <!-- Біржа 2 -->
            <div class="ob-col" style="border-right: none;">
                <div class="ob-header" id="ob-title-2">Exchange 2</div>
                <div class="ob-body">
                    <div class="ob-ticks">
                        <canvas id="ticks-canvas-2"></canvas>
                    </div>
                    <div class="ob-dom">
                        <div class="ob-section asks" id="ob-asks-2"></div>
                        <div class="ob-mid ob-mid-ex2" id="ob-mid-2">---</div>
                        <div class="ob-section bids" id="ob-bids-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="live.js"></script>
</body>
</html>
