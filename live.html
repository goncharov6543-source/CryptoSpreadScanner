<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Live Позиція</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0e11; color: #EAECEF; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Хедер */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #161a1e; border-bottom: 1px solid #2b3139; flex-shrink: 0;}
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header h2 { margin: 0; font-size: 1.3em; color: #f0b90b; letter-spacing: 0.5px; }
        .controls-group { display: flex; gap: 5px; background: #0b0e11; padding: 4px; border-radius: 6px; border: 1px solid #2b3139; }
        .btn-tf { background: transparent; border: none; color: #848e9c; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-tf.active { background: #3498db; color: #fff; }
        .btn-tf:hover:not(.active) { background: #2b3139; color: #fff; }
        .custom-select { background: #0b0e11; color: #848e9c; border: 1px solid #3c444f; padding: 6px 12px; border-radius: 6px; font-weight: bold; outline: none; cursor: pointer; transition: 0.2s; font-family: inherit;}
        
        .header-right { display: flex; align-items: center; gap: 20px; }
        .spread-badge { background: rgba(52, 152, 219, 0.15); color: #3498db; padding: 6px 15px; border-radius: 6px; font-size: 1.2em; font-weight: bold; border: 1px solid rgba(52, 152, 219, 0.3); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; transition: background 0.3s; }
        .dot-green { background-color: #00d67c; animation: blink 1.5s infinite; }
        .dot-red { background-color: #e74c3c; box-shadow: 0 0 8px rgba(231, 76, 60, 0.8); }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        /* Макет з повзунком */
        .main-layout { display: flex; flex: 1; height: 0; width: 100%; }
        
        /* 60% Графік */
        #chart-wrapper { width: 60%; height: 100%; display: flex; flex-direction: column; min-width: 20%; }
        .prices-overlay { display: flex; gap: 30px; padding: 10px 20px; font-size: 1.2em; font-weight: bold; background: #0b0e11; border-bottom: 1px solid #2b3139; flex-shrink: 0;}
        .price-box { display: flex; align-items: center; gap: 8px; }
        .price-ex1 { color: #00d67c; } 
        .price-ex2 { color: #2962FF; }
        #chart-container { flex: 1; width: 100%; position: relative; }

        /* СПЛІТТЕР */
        #resizer { width: 6px; background: #1e2329; cursor: col-resize; z-index: 10; transition: background 0.2s; border-left: 1px solid #2b3139; border-right: 1px solid #2b3139; flex-shrink: 0; }
        #resizer:hover, #resizer:active { background: #3498db; }

        /* 40% Стакани Контейнер */
        #ob-container { flex: 1; display: flex; flex-direction: column; min-width: 20%; background: #0b0e11; }
        
        /* ПАНЕЛЬ НАЛАШТУВАНЬ СТАКАНА */
        .dom-settings { display: flex; flex-wrap: wrap; gap: 15px; padding: 8px 15px; background: #161a1e; border-bottom: 1px solid #2b3139; font-size: 0.85em; color: #848e9c; align-items: center; justify-content: center; flex-shrink: 0;}
        .dom-settings label { display: flex; align-items: center; gap: 8px; font-weight: bold;}
        .dom-settings input[type=range] { width: 90px; accent-color: #848e9c; } /* СІРИЙ ПОВЗУНОК */
        .dom-settings select { background: #0b0e11; color: #EAECEF; border: 1px solid #3c444f; padding: 4px 8px; border-radius: 4px; font-weight: bold;}

        /* Самі стакани */
        #ob-wrapper { flex: 1; display: flex; min-height: 0; }
        .ob-col { width: 50%; height: 100%; display: flex; flex-direction: column; border-right: 1px solid #2b3139; box-sizing: border-box;}
        .ob-header { text-align: center; padding: 8px; background: #161a1e; font-weight: bold; color: #848e9c; border-bottom: 1px solid #2b3139; font-size: 0.9em; flex-shrink: 0;}
        
        .ob-body { display: flex; flex: 1; overflow: hidden; height: 100%; }
        
        /* Зона зліва для шаріків */
        .ob-ticks { flex: 1; position: relative; border-right: 1px dashed #2b3139; background: #0b0e11; }
        .ob-ticks canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        
        /* Зона справа для самого стакана */
        .ob-dom { flex: 1; display: flex; flex-direction: column; }
        
        .ob-section { flex: 15; display: flex; flex-direction: column; overflow: hidden; }
        .ob-mid { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.1em; font-weight: bold; background: #161a1e; border-top: 1px solid #2b3139; border-bottom: 1px solid #2b3139; overflow: hidden;}
        
        /* Ідеальна висота рядка */
        .ob-row { flex: 1; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; position: relative; font-family: monospace; z-index: 1; overflow: hidden;}
        .ob-row.empty { visibility: hidden; } /* Приховуємо текст пустих рядків, але тримаємо висоту */
        
        .ob-mid-ex1 { color: #00d67c; }
        .ob-mid-ex2 { color: #2962FF; }
        
        .ob-bg { position: absolute; right: 0; top: 0; height: 100%; z-index: -1; opacity: 0.15; transition: width 0.1s; }
        .ob-bg-ask { background-color: #ef5350; }
        .ob-bg-bid { background-color: #26a69a; }
        .ob-price { font-weight: bold; }
        .ob-qty { color: #d1d4dc; }
        .c-ask { color: #ef5350; }
        .c-bid { color: #26a69a; }

        /* ТРЕЙДИНГ ПАНЕЛЬ */
        .trade-tabs { display: flex; background: #0b0e11; border-radius: 4px; border: 1px solid #3c444f; overflow: hidden; }
        .trade-tab { flex: 1; padding: 6px; border: none; background: transparent; color: #848e9c; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.85em; }
        .trade-tab.active.green { background: rgba(0, 214, 124, 0.15); color: #00d67c; }
        .trade-tab.active.red { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }
        .btn-pct { flex: 1; background: #1e2329; border: 1px solid #3c444f; color: #848e9c; border-radius: 4px; padding: 4px 0; cursor: pointer; font-size: 0.75em; transition: 0.2s; }
        .btn-pct:hover { background: #2b3139; color: #fff; }
        input[type=range].trade-slider { width: 100%; accent-color: #3498db; margin-top: 4px; height: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h2 id="pair-title">Loading...</h2>
            <div class="controls-group">
                <button class="btn-tf btn-interval active" id="btn-1m" onclick="changeInterval(1, this)">1m</button>
                <button class="btn-tf btn-interval" onclick="changeInterval(5, this)">5m</button>
                <button class="btn-tf btn-interval" onclick="changeInterval(15, this)">15m</button>
            </div>
            <select class="custom-select" onchange="setColorMode(this.value)">
                <option value="standard">Свічки: Стандарт</option>
                <option value="solid">Свічки: Суцільні</option>
            </select>
        </div>
        <div class="header-right">
            <div class="spread-badge" id="header-spread">0.00%</div>
            <div title="Статус WebSocket з'єднання">
                <div class="status-dot dot-red" id="ws-status-dot"></div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div id="chart-wrapper">
            <div class="prices-overlay">
                <div class="price-box"><span id="name-ex1" style="font-size:0.8em; color:#848e9c;">Ex1</span> <span class="price-ex1" id="price-ex1">---</span></div>
                <div class="price-box"><span id="name-ex2" style="font-size:0.8em; color:#848e9c;">Ex2</span> <span class="price-ex2" id="price-ex2">---</span></div>
            </div>
            <div id="chart-container" style="flex: 2;"></div>
            
            <!-- НОВИЙ ГРАФІК СПРЕДУ -->
            <div style="flex: 1; border-top: 1px solid #2b3139; position: relative; display: flex; flex-direction: column; width: 100%;">
                <div style="position: absolute; top: 10px; left: 20px; z-index: 10; display: flex; align-items: center; gap: 10px;">
                    <div style="color: #848e9c; font-weight: bold; font-size: 0.85em; pointer-events: none; margin-right: 5px;">Історія спреду (1m):</div>
                    
                    <!-- РАМКА ДЛЯ КНОПОК -->
                    <div class="controls-group">
                        <button class="btn-tf btn-spread-time active" style="padding: 3px 8px; font-size: 0.8em;" onclick="loadSpreadHistory(0.5, this)">12H</button>
                        <button class="btn-tf btn-spread-time" style="padding: 3px 8px; font-size: 0.8em;" onclick="loadSpreadHistory(3, this)">3D</button>
                        <button class="btn-tf btn-spread-time" style="padding: 3px 8px; font-size: 0.8em;" onclick="loadSpreadHistory(7, this)">7D</button>
                    </div>
                    
                    <!-- ПРОГРЕС БАР -->
                    <div id="spread-progress-container" style="display: none; align-items: center; gap: 5px; margin-left: 10px;">
                        <span id="spread-progress-text" style="color: #848e9c; font-size: 0.8em; font-weight: bold;">0%</span>
                        <div style="width: 80px; height: 6px; background: #1e2329; border-radius: 3px; overflow: hidden; border: 1px solid #3c444f;">
                            <div id="spread-progress-fill" style="width: 0%; height: 100%; background: #848e9c; transition: width 0.2s;"></div>
                        </div>
                    </div>
                </div>
                <div id="spread-chart-container" style="flex: 1; width: 100%;"></div>
            </div>
        </div>
        
        <div id="resizer"></div>
        
        <div id="ob-container">
            <!-- ПАНЕЛЬ НАЛАШТУВАНЬ DOM -->
            <div class="dom-settings">
                <label>Об'єм:
                    <select id="dom-vol-type" onchange="updateDomSettings()">
                        <option value="USDT">В USDT ($)</option>
                        <option value="COIN">В Монетах</option>
                    </select>
                </label>
                <label>Групування: 
                    <select id="dom-precision" onchange="updateDomSettings()">
                        <option value="auto">Auto</option>
                        <option value="10">10</option>
                        <option value="1">1</option>
                        <option value="0.1">0.1</option>
                        <option value="0.01">0.01</option>
                        <option value="0.001">0.001</option>
                        <option value="0.0001">0.0001</option>
                        <option value="0.00001">0.00001</option>
                    </select>
                </label>
                <label>Масштаб UI: 
                    <input type="range" id="dom-scale" min="50" max="200" value="100" step="10" oninput="updateDomSettings()">
                    <span id="dom-scale-val" style="width: 40px;">100%</span>
                </label>
            </div>

            <!-- СТАКАН (2/3 Висоти) -->
            <div id="ob-wrapper" style="flex: 2; display: flex; min-height: 0;">
                <div class="ob-col">
                    <div class="ob-header" id="ob-title-1">Exchange 1</div>
                    <div class="ob-body">
                        <div class="ob-ticks"><canvas id="ticks-canvas-1"></canvas></div>
                        <div class="ob-dom">
                            <div class="ob-section asks" id="ob-asks-1"></div>
                            <div class="ob-mid ob-mid-ex1" id="ob-mid-1">---</div>
                            <div class="ob-section bids" id="ob-bids-1"></div>
                        </div>
                    </div>
                </div>
                <div class="ob-col" style="border-right: none;">
                    <div class="ob-header" id="ob-title-2">Exchange 2</div>
                    <div class="ob-body">
                        <div class="ob-ticks"><canvas id="ticks-canvas-2"></canvas></div>
                        <div class="ob-dom">
                            <div class="ob-section asks" id="ob-asks-2"></div>
                            <div class="ob-mid ob-mid-ex2" id="ob-mid-2">---</div>
                            <div class="ob-section bids" id="ob-bids-2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ТОРГОВА ПАНЕЛЬ (1/3 Висоти) -->
            <div id="trading-panel" style="flex: 1; border-top: 1px solid #2b3139; display: flex; flex-direction: column; background: #161a1e;">
                <div style="display: flex; flex: 1; min-height: 0;">
                    
                    <!-- Блок для Біржі 1 -->
                    <div style="flex: 1; border-right: 1px solid #2b3139; padding: 10px; display: flex; flex-direction: column; gap: 8px; justify-content: center;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="color:#848e9c; font-size: 0.8em;">Баланс:</span>
                            <span id="bal-ex1" style="color:#fff; font-weight: bold; font-size: 0.85em;">~ USDT</span>
                        </div>
                        <div class="trade-tabs" id="tabs-dir-1">
                            <button class="trade-tab active green" id="btn-buy-1" onclick="setTradeDir(1, 'buy')">Купити</button>
                            <button class="trade-tab red" id="btn-sell-1" onclick="setTradeDir(1, 'sell')">Продати</button>
                        </div>
                        <div id="lev-container-1" style="display:none; flex-direction: column; gap: 2px;">
                            <div style="display:flex; justify-content:space-between; font-size: 0.75em; color:#848e9c;">
                                <span>Плече:</span><span id="lev-val-1" style="color:#fff; font-weight:bold;">10x</span>
                            </div>
                            <input type="range" id="lev-slider-1" class="trade-slider" min="1" max="100" value="10" oninput="document.getElementById('lev-val-1').innerText = this.value + 'x'">
                        </div>
                        <div style="display: flex; background: #0b0e11; border: 1px solid #3c444f; border-radius: 4px; padding: 2px;">
                            <input type="number" id="trade-amount-1" placeholder="Кількість" style="flex: 1; background: transparent; border: none; color: #fff; padding: 5px; outline: none; min-width: 0; font-size:0.9em;">
                            <select id="trade-type-1" style="background: transparent; border: none; color: #848e9c; border-left: 1px solid #3c444f; outline: none; cursor: pointer; font-size:0.85em;" onchange="setTradePercent(1, window['lastPct1'] || 0)">
                                <option value="USDT">USDT</option>
                                <option value="COIN">COIN</option>
                            </select>
                        </div>
                        <div style="display: flex; gap: 5px; justify-content: space-between;">
                            <button class="btn-pct" onclick="setTradePercent(1, 0.1)">10%</button>
                            <button class="btn-pct" onclick="setTradePercent(1, 0.25)">25%</button>
                            <button class="btn-pct" onclick="setTradePercent(1, 0.5)">50%</button>
                            <button class="btn-pct" onclick="setTradePercent(1, 1)">100%</button>
                        </div>
                    </div>
                    
                    <!-- Блок для Біржі 2 -->
                    <div style="flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; justify-content: center;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="color:#848e9c; font-size: 0.8em;">Баланс:</span>
                            <span id="bal-ex2" style="color:#fff; font-weight: bold; font-size: 0.85em;">~ USDT</span>
                        </div>
                        <div class="trade-tabs" id="tabs-dir-2">
                            <button class="trade-tab active green" id="btn-buy-2" onclick="setTradeDir(2, 'buy')">Купити</button>
                            <button class="trade-tab red" id="btn-sell-2" onclick="setTradeDir(2, 'sell')">Продати</button>
                        </div>
                        <div id="lev-container-2" style="display:none; flex-direction: column; gap: 2px;">
                            <div style="display:flex; justify-content:space-between; font-size: 0.75em; color:#848e9c;">
                                <span>Плече:</span><span id="lev-val-2" style="color:#fff; font-weight:bold;">10x</span>
                            </div>
                            <input type="range" id="lev-slider-2" class="trade-slider" min="1" max="100" value="10" oninput="document.getElementById('lev-val-2').innerText = this.value + 'x'">
                        </div>
                        <div style="display: flex; background: #0b0e11; border: 1px solid #3c444f; border-radius: 4px; padding: 2px;">
                            <input type="number" id="trade-amount-2" placeholder="Кількість" style="flex: 1; background: transparent; border: none; color: #fff; padding: 5px; outline: none; min-width: 0; font-size:0.9em;">
                            <select id="trade-type-2" style="background: transparent; border: none; color: #848e9c; border-left: 1px solid #3c444f; outline: none; cursor: pointer; font-size:0.85em;" onchange="setTradePercent(2, window['lastPct2'] || 0)">
                                <option value="USDT">USDT</option>
                                <option value="COIN">COIN</option>
                            </select>
                        </div>
                        <div style="display: flex; gap: 5px; justify-content: space-between;">
                            <button class="btn-pct" onclick="setTradePercent(2, 0.1)">10%</button>
                            <button class="btn-pct" onclick="setTradePercent(2, 0.25)">25%</button>
                            <button class="btn-pct" onclick="setTradePercent(2, 0.5)">50%</button>
                            <button class="btn-pct" onclick="setTradePercent(2, 1)">100%</button>
                        </div>
                    </div>
                </div>

                <!-- Головна кнопка виконання -->
                <div style="padding: 10px; border-top: 1px solid #2b3139; text-align: center;">
                    <button id="btn-execute-all" style="width: 100%; background: #00d67c; color: #000; font-weight: bold; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 1.05em; transition: 0.2s;" onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='brightness(1)'" onclick="executeDualTrade()">ВІДКРИТИ МАРКЕТ ОРДЕРИ</button>
                </div>
            </div>
        </div>
    </div>

    <script src="live.js"></script>
</body>
</html>
